<main class="app-shell py-4 py-lg-5">
  <div class="theme-toggle-floating">
    <app-theme-toggle-button />
  </div>

  <div class="container-xl">
    <nav class="app-navbar mb-4" aria-label="Navegação principal">
      <div class="app-navbar__brand">
        <i class="bi bi-buildings" aria-hidden="true"></i>
      </div>

      <div class="app-navbar__links">
        <a class="app-navbar__link app-navbar__link--active" href="#">Início</a>
        <button type="button" class="app-navbar__link" (click)="openCreateModal()">Cadastrar</button>
        <a class="app-navbar__link" href="#">Favoritos</a>
        <a class="app-navbar__link" href="#">Configurações</a>
      </div>

      <div class="app-navbar__meta">
        <span>{{ pageData().totalItems }} registros</span>
      </div>
    </nav>

    <app-property-listings-table
      [pageData]="pageData()"
      [isLoading]="isLoading()"
      [loadError]="loadError()"
      (previousPage)="goToPreviousPage()"
      (nextPage)="goToNextPage()"
      (requestDelete)="openDeleteModal($event)"
    />
  </div>
</main>

@if (isDeleteModalOpen() && propertyPendingDelete(); as propertyPendingDelete) {
  <app-confirm-delete-modal
    [propertyTitle]="propertyPendingDelete.title"
    [isDeleting]="isDeleting()"
    [errorMessage]="deleteError()"
    (cancel)="closeDeleteModal()"
    (confirm)="confirmDelete()"
  />
}

@if (isCreateModalOpen()) {
  <app-create-property-modal
    [isSaving]="isSaving()"
    [submitError]="createError()"
    (cancel)="closeCreateModal()"
    (save)="createProperty($event)"
  />
}

<router-outlet />
