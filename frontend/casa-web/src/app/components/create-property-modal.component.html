<div class="modal-backdrop-shell">
  <section
    class="create-modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="create-property-title"
  >
    <div class="create-modal__header">
      <div>
        <p class="create-modal__eyebrow mb-1">Cadastro rapido</p>
        <h2 id="create-property-title" class="create-modal__title mb-0">Novo imovel</h2>
      </div>

      <button
        type="button"
        class="btn create-modal__close"
        aria-label="Fechar cadastro"
        title="Fechar cadastro"
        (click)="cancel.emit()"
        [disabled]="isSaving() || isCepLoading()"
      >
        <i class="bi bi-x-lg" aria-hidden="true"></i>
      </button>
    </div>

    <div class="create-modal__content">
      <form class="create-form" (submit)="$event.preventDefault(); submit()">
        <section class="create-form__grid">
          <label class="field-shell">
            <span class="field-shell__label">Titulo</span>
            <input
              class="form-control field-shell__control"
              [ngModel]="form().title"
              (ngModelChange)="updateField('title', $event)"
              name="title"
              placeholder="Ex.: Apartamento com varanda"
            />
          </label>

          <label class="field-shell">
            <span class="field-shell__label">Categoria</span>
            <input
              class="form-control field-shell__control"
              [ngModel]="form().category"
              (ngModelChange)="updateField('category', $event)"
              name="category"
              placeholder="Apartamento, casa, studio..."
            />
          </label>

          <label class="field-shell">
            <span class="field-shell__label">Origem</span>
            <div class="app-select-shell">
              <select
                class="form-control field-shell__control app-select"
                [ngModel]="form().source"
                (ngModelChange)="updateSource($event)"
                name="source"
              >
                @for (option of sourceOptions; track option.value) {
                  <option [ngValue]="option.value">{{ option.label }}</option>
                }
              </select>
            </div>
          </label>

          <label class="field-shell">
            <span class="field-shell__label">Status</span>
            <div class="app-select-shell">
              <select
                class="form-control field-shell__control app-select"
                [ngModel]="form().swotStatus"
                (ngModelChange)="updateStatus($event)"
                name="swotStatus"
              >
                @for (option of statusOptions; track option.value) {
                  <option [ngValue]="option.value">{{ option.label }}</option>
                }
              </select>
            </div>
          </label>

          <label class="field-shell field-shell--full">
            <span class="field-shell__label">Link do anuncio</span>
            <input
              class="form-control field-shell__control"
              [ngModel]="form().originalUrl"
              (ngModelChange)="updateField('originalUrl', $event)"
              name="originalUrl"
              placeholder="https://..."
            />
          </label>

          <label class="field-shell">
            <span class="field-shell__label">Valor</span>
            <input
              class="form-control field-shell__control"
              [ngModel]="form().price"
              (ngModelChange)="updateNumber('price', $event)"
              name="price"
              inputmode="decimal"
              placeholder="2500"
            />
          </label>

          <label class="field-shell field-shell--toggle">
            <span class="field-shell__label">Localizacao exata</span>
            <div class="form-check form-switch m-0">
              <input
                class="form-check-input"
                type="checkbox"
                [ngModel]="form().hasExactLocation"
                (ngModelChange)="updateBoolean('hasExactLocation', $event)"
                name="hasExactLocation"
              />
            </div>
          </label>
        </section>

        <section class="create-form__address">
          <div class="section-heading">
            <h3 class="section-heading__title mb-0">Endereco</h3>
            <p class="section-heading__copy mb-0">
              Preencha o CEP e saia do campo para buscar os dados automaticamente.
            </p>
          </div>

          <div class="create-form__grid">
            <label class="field-shell">
              <span class="field-shell__label">CEP</span>
              <input
                class="form-control field-shell__control"
                [ngModel]="form().postalCode"
                (ngModelChange)="updateField('postalCode', $event)"
                (blur)="lookupCep()"
                name="postalCode"
                placeholder="00000-000"
              />
            </label>

            <label class="field-shell">
              <span class="field-shell__label">Estado</span>
              <input
                class="form-control field-shell__control"
                [ngModel]="form().state"
                (ngModelChange)="updateField('state', $event)"
                name="state"
                maxlength="2"
              />
            </label>

            <label class="field-shell field-shell--full">
              <span class="field-shell__label">Endereco</span>
              <input
                class="form-control field-shell__control"
                [ngModel]="form().addressLine"
                (ngModelChange)="updateField('addressLine', $event)"
                name="addressLine"
                placeholder="Rua, numero, complemento"
              />
            </label>

            <label class="field-shell">
              <span class="field-shell__label">Bairro</span>
              <input
                class="form-control field-shell__control"
                [ngModel]="form().neighborhood"
                (ngModelChange)="updateField('neighborhood', $event)"
                name="neighborhood"
              />
            </label>

            <label class="field-shell">
              <span class="field-shell__label">Cidade</span>
              <input
                class="form-control field-shell__control"
                [ngModel]="form().city"
                (ngModelChange)="updateField('city', $event)"
                name="city"
              />
            </label>
          </div>

          <div class="create-form__grid">
            <label class="field-shell">
              <span class="field-shell__label">Latitude</span>
              <input
                class="form-control field-shell__control"
                [ngModel]="form().latitude"
                (ngModelChange)="updateNumber('latitude', $event)"
                name="latitude"
                inputmode="decimal"
                placeholder="-23.55052"
              />
            </label>

            <label class="field-shell">
              <span class="field-shell__label">Longitude</span>
              <input
                class="form-control field-shell__control"
                [ngModel]="form().longitude"
                (ngModelChange)="updateNumber('longitude', $event)"
                name="longitude"
                inputmode="decimal"
                placeholder="-46.63331"
              />
            </label>
          </div>

          @if (cepError()) {
            <div class="alert alert-warning mb-0" role="alert">
              {{ cepError() }}
            </div>
          }
        </section>

        @if (submitError()) {
          <div class="alert alert-danger mb-0 mt-3" role="alert">
            {{ submitError() }}
          </div>
        }
      </form>
    </div>

    <div class="create-modal__footer">
      <button
        type="button"
        class="btn btn-outline-brand"
        (click)="cancel.emit()"
        [disabled]="isSaving() || isCepLoading()"
      >
        Cancelar
      </button>
      <button
        type="button"
        class="btn btn-brand"
        (click)="submit()"
        [disabled]="!canSubmit() || isSaving() || isCepLoading()"
      >
        @if (isSaving()) {
          <span class="spinner-border spinner-border-sm me-2" aria-hidden="true"></span>
          Salvando...
        } @else {
          Salvar registro
        }
      </button>
    </div>

    @if (isCepLoading()) {
      <div class="create-modal__loading">
        <div class="create-modal__loading-card">
          <div class="spinner-border" role="status" aria-hidden="true"></div>
          <strong>Buscando endereco pelo CEP...</strong>
          <span>Aguarde enquanto os campos sao preenchidos.</span>
        </div>
      </div>
    }
  </section>
</div>
