<section class="hero-panel hero-panel--compact p-3 p-lg-4 mb-4">
  <div class="row g-4 align-items-center">
    <div class="col-lg-7">
      <p class="section-kicker mb-2">Imóveis</p>
      <h1 class="display-title display-title--compact mb-0">
        Registros salvos
      </h1>
    </div>

    <div class="col-lg-5">
      <div class="summary-card">
        <span class="summary-label">Total de registros</span>
        <strong class="summary-value">{{ totalItems() }}</strong>
        <p class="summary-copy mb-0">
          Página {{ page() }} de {{ totalPages() || 1 }} com {{ pageSize() }}
          registros por carregamento.
        </p>
      </div>
    </div>
  </div>
</section>
